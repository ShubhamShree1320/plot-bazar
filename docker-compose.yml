services:
  postgres:
    image: postgres:17-alpine
    container_name: plotbazaar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: plotbazaar
      POSTGRES_PASSWORD: plotbazaar
      POSTGRES_DB: plotbazaar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plotbazaar -d plotbazaar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
