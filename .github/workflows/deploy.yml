name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: 54.208.40.170
          username: ubuntu
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          port: 22
          source: ".,!.git,!.venv,!__pycache__,!*.pyc"
          target: /home/ubuntu/plot-bazar

      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@master
        with:
          host: 54.208.40.170
          username: ubuntu
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            cd /home/ubuntu/plot-bazar
            pkill -f "next dev" 2>/dev/null || true
            docker compose down 2>/dev/null || true
            chmod +x dev.sh
            nohup bash dev.sh > /home/ubuntu/plot-bazar/dev.log 2>&1 </dev/null &
            disown
            echo "Dev server starting, PID $!"
            sleep 10
            tail -20 /home/ubuntu/plot-bazar/dev.log || true
            echo "Deployed successfully at $(date)"
