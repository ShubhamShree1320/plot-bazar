name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: 54.208.40.170
          username: ubuntu
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          source: ".,!.git,!.venv,!__pycache__,!*.pyc,!node_modules"
          target: /home/ubuntu/plot-bazar

      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@master
        with:
          host: 54.208.40.170
          username: ubuntu
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            cd /home/ubuntu/plot-bazar
            pkill -f "next dev" 2>/dev/null || true
            timeout 30 docker compose down 2>/dev/null || true
            chmod +x dev.sh
            setsid nohup bash dev.sh > /home/ubuntu/plot-bazar/dev.log 2>&1 </dev/null &
            echo "Dev server starting at $(date)"
