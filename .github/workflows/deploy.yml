name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: 54.208.40.170
          username: ubuntu
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          source: ".,!.git,!.venv,!__pycache__,!*.pyc,!node_modules"
          target: /home/ubuntu/plot-bazar

      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@master
        with:
          host: 54.208.40.170
          username: ubuntu
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            cd /home/ubuntu/plot-bazar

            # Install PM2 if not present
            command -v pm2 || sudo npm install -g pm2

            # Restart postgres
            timeout 30 docker compose down 2>/dev/null || true
            docker compose up -d

            # Wait for postgres to be ready
            echo "Waiting for PostgreSQL..."
            until docker compose exec -T postgres pg_isready -U plotbazaar -d plotbazaar -q 2>/dev/null; do sleep 1; done
            echo "PostgreSQL ready."

            # Ensure .env exists
            [ -f .env ] || cp .env.example .env 2>/dev/null || touch .env
            grep -q '^DATABASE_URL=' .env || echo 'DATABASE_URL="postgresql://plotbazaar:plotbazaar@localhost:5432/plotbazaar"' >> .env

            # Install deps and run Prisma
            npm install
            npx prisma generate
            npx prisma db push

            # Start / restart app with PM2
            pm2 stop plot-bazar 2>/dev/null || true
            pm2 delete plot-bazar 2>/dev/null || true
            pm2 start "npm run dev" --name plot-bazar
            pm2 save

            echo "Deployed successfully at $(date)"
